  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    #header {
      background: #1a1a2e;
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      z-index: 1001;
    }
    #header h1 { font-size: 15px; white-space: nowrap; }

    #api-key-input {
      padding: 5px 10px;
      border-radius: 4px;
      border: none;
      font-size: 13px;
      width: 280px;
      background: #2a2a4e;
      color: white;
      outline: none;
    }
    #api-key-input::placeholder { color: #666; }

    .btn {
      padding: 5px 14px;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

      position: absolute;

      right: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);

// ════════════════════════════════════════════════════════════
// マップ初期化
// ════════════════════════════════════════════════════════════
const map = L.map('map').setView([35.60, 139.70], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',

// ════════════════════════════════════════════════════════════
// 状態
// ════════════════════════════════════════════════════════════
let trainMarkers = [];
let railwayLayers = [];
let refreshTimer  = null;
let apiKey        = '';
let demoTimer     = null;

// デモアニメーション用
const SEGMENT_DURATION_MS = 20000; // 1駅間の標準通過時間(ms)
let demoTrains       = [];
let animationFrameId = null;
let lastAnimTime     = null;

// 実データアニメーション用
let realTrains        = new Map(); // trainNo → state
let realAnimFrameId   = null;
let realLastAnimTime  = null;

// ════════════════════════════════════════════════════════════
// ユーティリティ
// ════════════════════════════════════════════════════════════
function updateStatus(text, color = '#aaa') {
  const el = document.getElementById('status');
  el.textContent = text;
  el.style.color = color;
}

function clearTrainMarkers() {
  if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
  lastAnimTime = null;
  demoTrains = [];
  if (realAnimFrameId) { cancelAnimationFrame(realAnimFrameId); realAnimFrameId = null; }
  realLastAnimTime = null;
  realTrains.clear();
  trainMarkers.forEach(m => map.removeLayer(m));
  trainMarkers = [];
}

function getLineCode(odptId) {
  const m = odptId.match(/odpt\.Train:(\w+)\.(\w+)\./);
  if (!m) return null;
  const [, operator, line] = m;
  return operator === 'TokyoMetro' ? line : `${operator}.${line}`;
}

function createDotIcon(color) {
  return L.divIcon({
    html: `<div style="
      width:14px; height:14px; border-radius:50%;
      background:${color}; border:2.5px solid white;
      box-shadow:0 1px 5px rgba(0,0,0,0.5);
    "></div>`,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10],
  });
}

function placeTrainMarker({ lat, lng, lineName, lineColor, trainNo, stationName, destName, delay }) {
  const marker = L.marker([lat, lng], { icon: createDotIcon(lineColor) });
  marker.bindPopup(`
    <div style="font-size:13px;line-height:1.9;min-width:160px">
      <b style="color:${lineColor}">${lineName}</b><br>
      列車番号: <b>${trainNo}</b><br>
      現在位置: ${stationName}<br>
      行先: ${destName}<br>
      遅延: ${delay > 0 ? `<span style="color:#e00">${delay}秒</span>` : 'なし'}
    </div>
  `);
  marker.addTo(map);
  trainMarkers.push(marker);
}

// ════════════════════════════════════════════════════════════
// B. 路線ラインを描画（DEMO_STATIONS の座標を順につなぐ）
// ════════════════════════════════════════════════════════════
function drawRailwayLines() {
  railwayLayers.forEach(l => map.removeLayer(l));
  railwayLayers = [];

  for (const [code, stations] of Object.entries(DEMO_STATIONS)) {
    const color   = LINES[code].color;
    const latlngs = stations.map(s => [s.lat, s.lng]);
    const poly = L.polyline(latlngs, {
      color,
      weight: 4,
      opacity: 0.75,
    }).addTo(map);
    railwayLayers.push(poly);
  }

  updateStatus('APIキーを入力するか「デモモード」を押してください');
}

// ════════════════════════════════════════════════════════════
// A. デモモード（リアルタイムアニメーション）
// ════════════════════════════════════════════════════════════
const DEMO_TRAIN_LETTERS = { Ginza:'G', Marunouchi:'M', Hibiya:'H', Tozai:'T',
  Chiyoda:'C', Yurakucho:'Y', Hanzomon:'Z', Namboku:'N', Fukutoshin:'F' };

/**
 * fromIdx → toIdx 間を progress(0-1) で補間した座標を返す
 * 実APIモードと同じ「駅A → 駅B」セグメント方式
 */
function getTrainInterpolatedPos(train) {
  const stations = DEMO_STATIONS[train.code];
  const from = stations[train.fromIdx];
  const to   = stations[train.toIdx];
  const t    = train.progress;
  return {
    lat:      from.lat + (to.lat - from.lat) * t,
    lng:      from.lng + (to.lng - from.lng) * t,
    fromName: from.name,
    toName:   to.name,
  };
}

function updateDemoTrainPopup(train) {
  const line     = LINES[train.code];
  const stations = DEMO_STATIONS[train.code];
  const pos      = getTrainInterpolatedPos(train);
  const destName = train.forward
    ? stations[stations.length - 1].name
    : stations[0].name;
  train.marker.setPopupContent(`
    <div style="font-size:13px;line-height:1.9;min-width:160px">
      <b style="color:${line.color}">${line.name}</b><br>
      列車番号: <b>${train.trainNo}</b><br>
      現在位置: ${pos.fromName} → ${pos.toName}<br>
      行先: ${destName}<br>
      遅延: ${train.delay > 0 ? `<span style="color:#e00">${train.delay}秒</span>` : 'なし'}
    </div>
  `);
}

function advanceDemoTrain(train, dt) {
  const stations = DEMO_STATIONS[train.code];
  const n = stations.length;
  train.progress += dt / (SEGMENT_DURATION_MS * train.speedFactor);

  while (train.progress >= 1) {
    train.progress -= 1;
    // 次の区間へ進む
    if (train.forward) {
      train.fromIdx = train.toIdx;
      train.toIdx   = train.fromIdx + 1;
      if (train.toIdx >= n) {           // 終端に到達 → 折り返し
        train.forward  = false;
        train.toIdx    = train.fromIdx - 1;
      }
    } else {
      train.fromIdx = train.toIdx;
      train.toIdx   = train.fromIdx - 1;
      if (train.toIdx < 0) {            // 始端に到達 → 折り返し
        train.forward = true;
        train.toIdx   = train.fromIdx + 1;
      }
    }
    updateDemoTrainPopup(train);
  }
}

function runDemoAnimation(timestamp) {
  if (lastAnimTime === null) lastAnimTime = timestamp;
  const dt = Math.min(timestamp - lastAnimTime, 200); // タブ復帰時の跳び防止
  lastAnimTime = timestamp;

  for (const train of demoTrains) {
    advanceDemoTrain(train, dt);
    const pos = getTrainInterpolatedPos(train);
    train.marker.setLatLng([pos.lat, pos.lng]);
  }
  animationFrameId = requestAnimationFrame(runDemoAnimation);
}

function makeDemoTrains() {
  clearTrainMarkers();
  if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }

  for (const [code, stations] of Object.entries(DEMO_STATIONS)) {
    const line   = LINES[code];
    const letter = DEMO_TRAIN_LETTERS[code];

    // 各路線に 2〜3 本配置
    const count = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      const forward = Math.random() > 0.5;
      const n = stations.length;
      // forward: fromIdx は 0〜n-2、backward: fromIdx は 1〜n-1
      const fromIdx = forward
        ? Math.floor(Math.random() * (n - 1))
        : 1 + Math.floor(Math.random() * (n - 1));
      const toIdx = forward ? fromIdx + 1 : fromIdx - 1;
      const progress    = Math.random(); // 区間内のランダム初期位置
      const speedFactor = 0.8 + Math.random() * 0.4; // ±20% の速度ばらつき
      const trainNo     = `${letter}${String(100 + Math.floor(Math.random() * 200)).padStart(3,'0')}S`;
      const delay       = Math.random() < 0.15 ? 60 + Math.floor(Math.random() * 120) : 0;

      const train = { code, fromIdx, toIdx, forward, progress, speedFactor, trainNo, delay, marker: null };
      const pos   = getTrainInterpolatedPos(train);
      const destName = forward ? stations[n - 1].name : stations[0].name;

      const marker = L.marker([pos.lat, pos.lng], { icon: createDotIcon(line.color) });
      marker.bindPopup(`
        <div style="font-size:13px;line-height:1.9;min-width:160px">
          <b style="color:${line.color}">${line.name}</b><br>
          列車番号: <b>${trainNo}</b><br>
          現在位置: ${pos.fromName} → ${pos.toName}<br>
          行先: ${destName}<br>
          遅延: ${delay > 0 ? `<span style="color:#e00">${delay}秒</span>` : 'なし'}
        </div>
      `);
      marker.addTo(map);
      trainMarkers.push(marker);
      train.marker = marker;
      demoTrains.push(train);
    }
  }

  // アニメーション開始
  lastAnimTime = null;
  animationFrameId = requestAnimationFrame(runDemoAnimation);

  const now = new Date().toLocaleTimeString('ja-JP');
  updateStatus(`[デモ] ${demoTrains.length}本 リアルタイム走行中 ｜ ${now}`, '#7c5cbf');

  // ステータスを定期更新（電車は止めない）
  demoTimer = setInterval(() => {
    const t = new Date().toLocaleTimeString('ja-JP');
    updateStatus(`[デモ] ${demoTrains.length}本 リアルタイム走行中 ｜ ${t}`, '#7c5cbf');
  }, 10000);
}

function startDemo() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  document.getElementById('load-btn').disabled = false;
  document.getElementById('load-btn').textContent = '読み込む';
  apiKey = '';
  makeDemoTrains();
}

// ════════════════════════════════════════════════════════════
// ODPT API（実データ）
// ════════════════════════════════════════════════════════════
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  return res.json();
}

async function fetchRailways(key) {
  const operators = ['TokyoMetro', 'Toei', 'YokohamaMunicipal'];
  const responses = await Promise.allSettled(
    operators.map(op =>
      fetchJSON(`https://api.odpt.org/api/v4/odpt:Railway?odpt:operator=odpt.Operator:${op}&acl:consumerKey=${encodeURIComponent(key)}`)
    )
  );
  const result = [];
  for (const res of responses) {
    if (res.status === 'fulfilled') result.push(...res.value);
  }
  return result;
}

function drawRealRailwayLines(railways, stationMap) {
  railwayLayers.forEach(l => map.removeLayer(l));
  railwayLayers = [];

  for (const railway of railways) {
    const rwId = railway['owl:sameAs'] || '';
    // odpt.Railway:Toei.Asakusa → Toei.Asakusa
    const m = rwId.match(/odpt\.Railway:(?:TokyoMetro\.(\w+)|(\w+)\.(\w+))/);
    if (!m) continue;
    const code = m[1] || `${m[2]}.${m[3]}`;
    const line = LINES[code];
    if (!line) continue;

    const order = railway['odpt:stationOrder'];
    if (!Array.isArray(order)) continue;

    const latlngs = order
      .sort((a, b) => (a['odpt:index'] || 0) - (b['odpt:index'] || 0))
      .map(entry => stationMap[entry['odpt:station']])
      .filter(Boolean)
      .map(s => [s.lat, s.lng]);

    if (latlngs.length < 2) continue;

    const poly = L.polyline(latlngs, {
      color: line.color,
      weight: 4,
      opacity: 0.75,
    }).addTo(map);
    railwayLayers.push(poly);
  }
}

async function fetchStations(key) {
  const operators = ['TokyoMetro', 'Toei', 'YokohamaMunicipal'];
  const responses = await Promise.allSettled(
    operators.map(op =>
      fetchJSON(`https://api.odpt.org/api/v4/odpt:Station?odpt:operator=odpt.Operator:${op}&acl:consumerKey=${encodeURIComponent(key)}`)
    )
  );
  const result = {};
  for (const res of responses) {
    if (res.status !== 'fulfilled') continue;
    for (const s of res.value) {
      const id  = s['owl:sameAs'];
      const lat = s['geo:lat'];
      const lng = s['geo:long'];
      if (id && lat != null && lng != null) {
        result[id] = { lat, lng, name: s['dc:title'] || id.split('.').pop() };
      }
    }
  }
  console.log(`[ODPT] 駅データ: 座標あり=${Object.keys(result).length}件`);
  return result;
}

async function fetchTrains(key) {
  return fetchJSON(
    `https://api.odpt.org/api/v4/odpt:Train?acl:consumerKey=${encodeURIComponent(key)}`
  );
}

// 実データ用アニメーションループ（fromStation→toStation を30秒かけて移動）
function runRealAnimation(timestamp) {
  if (realLastAnimTime === null) realLastAnimTime = timestamp;
  const dt = Math.min(timestamp - realLastAnimTime, 200);
  realLastAnimTime = timestamp;
  for (const [, t] of realTrains) {
    t.progress = Math.min(1, t.progress + dt / 30000);
    const lat = t.fromLat + (t.toLat - t.fromLat) * t.progress;
    const lng = t.fromLng + (t.toLng - t.fromLng) * t.progress;
    t.marker.setLatLng([lat, lng]);
  }
  realAnimFrameId = requestAnimationFrame(runRealAnimation);
}

async function refresh(stationMap) {
  try {
    const trains = await fetchTrains(apiKey);
    console.log(`[ODPT] 列車データ: API=${trains.length}件, 駅マップ=${Object.keys(stationMap).length}件`);
    if (trains.length > 0) {
      const operators = [...new Set(trains.map(t => t['odpt:operator']).filter(Boolean))];
      console.log('[ODPT] 取得できたオペレータ:', operators);
    }
    const activeNos = new Set();
    let skippedNoStation = 0;

    for (const train of trains) {
      const fromId = train['odpt:fromStation'];
      const toId   = train['odpt:toStation'];
      if (!fromId && !toId) { skippedNoStation++; continue; }
      const fromSt = fromId ? stationMap[fromId] : null;
      const toSt   = toId   ? stationMap[toId]   : null;
      if (!fromSt && !toSt) { skippedNoStation++; continue; }

      const code    = getLineCode(train['owl:sameAs'] || '');
      const line    = LINES[code] || { name: code || '不明', color: '#666' };
      const delay   = train['odpt:delay'] || 0;
      const trainNo = train['odpt:trainNumber'] || '不明';
      const destArr = train['odpt:destinationStation'];
      const destId  = destArr?.at(-1);
      const destName = destId ? (stationMap[destId]?.name || destId.split('.').pop()) : '不明';

      const fromLat = (fromSt || toSt).lat, fromLng = (fromSt || toSt).lng;
      const toLat   = (toSt   || fromSt).lat, toLng   = (toSt   || fromSt).lng;
      const nearName = fromSt ? fromSt.name : toSt.name;
      const toName   = toSt   ? toSt.name   : nearName;

      activeNos.add(trainNo);
      const existing = realTrains.get(trainNo);

      if (existing && existing.fromId === fromId) {
        // 同じ駅間 → 進行を継続、行先だけ更新
        existing.toLat = toLat; existing.toLng = toLng;
      } else {
        // 新しい区間 or 新規列車 → マーカーを作り直す
        if (existing) {
          map.removeLayer(existing.marker);
          trainMarkers = trainMarkers.filter(m => m !== existing.marker);
        }
        const marker = L.marker([fromLat, fromLng], { icon: createDotIcon(line.color) });
        marker.bindPopup(`
          <div style="font-size:13px;line-height:1.9;min-width:160px">
            <b style="color:${line.color}">${line.name}</b><br>
            列車番号: <b>${trainNo}</b><br>
            現在位置: ${nearName} → ${toName}<br>
            行先: ${destName}<br>
            遅延: ${delay > 0 ? `<span style="color:#e00">${delay}秒</span>` : 'なし'}
          </div>
        `);
        marker.addTo(map);
        trainMarkers.push(marker);
        realTrains.set(trainNo, { marker, fromId, fromLat, fromLng, toLat, toLng, progress: 0 });
      }
    }

    // 消えた列車を除去
    for (const [no, t] of realTrains) {
      if (!activeNos.has(no)) {
        map.removeLayer(t.marker);
        trainMarkers = trainMarkers.filter(m => m !== t.marker);
        realTrains.delete(no);
      }
    }

    // アニメーション再起動
    if (realAnimFrameId) { cancelAnimationFrame(realAnimFrameId); realAnimFrameId = null; }
    realLastAnimTime = null;
    realAnimFrameId = requestAnimationFrame(runRealAnimation);

    console.log(`[ODPT] 表示: ${realTrains.size}本, スキップ: ${skippedNoStation}本`);
    const now = new Date().toLocaleTimeString('ja-JP');
    if (realTrains.size === 0) {
      if (trains.length === 0) {
        updateStatus(`列車データなし ｜ ${now} ｜ APIキーのアクセス権または運行時間をご確認ください`, '#FF9500');
      } else {
        updateStatus(`列車データ${trains.length}件取得も駅IDが一致せず表示できません ｜ ${now}`, '#FF9500');
      }
    } else {
      updateStatus(`${realTrains.size}本運行中 ｜ 最終更新: ${now}`, '#4CAF50');
    }
  } catch (e) {
    updateStatus('取得エラー: ' + e.message, '#FF5555');
    console.error(e);
  }
}

async function loadData() {
  apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey) {
    updateStatus('APIキーを入力してください', '#FF9500');
    return;
  }
  // デモ停止
  if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
  clearTrainMarkers();

  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  updateStatus('駅データ取得中...', '#4CAF50');

  try {
    const [stationMap, railways] = await Promise.all([
      fetchStations(apiKey),
      fetchRailways(apiKey),
    ]);
    if (Object.keys(stationMap).length === 0) {
      updateStatus('駅データが取得できませんでした。APIキーを確認してください', '#FF5555');
      btn.disabled = false;
      btn.textContent = '読み込む';
      return;
    }
    if (railways.length > 0) {
      drawRealRailwayLines(railways, stationMap);
    }
    updateStatus('列車データ取得中...', '#4CAF50');
    await refresh(stationMap);
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(() => refresh(stationMap), 30000);
    btn.textContent = '更新中(30s)';
  } catch (e) {
    updateStatus('エラー: ' + e.message, '#FF5555');
    console.error(e);
    btn.disabled = false;
    btn.textContent = '読み込む';
  }
}

document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadData();
});
